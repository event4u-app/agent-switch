# Taskfile for agent-switch — https://taskfile.dev
# Run `task` (or `task --list`) to see everything.
version: "3"

vars:
  NODE: node

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --list

  # ---------- setup ----------
  install:
    desc: Install CLI + GUI dependencies (npm ci)
    cmds:
      - npm ci
      - npm --prefix gui ci

  deps:
    desc: Install CLI deps only if package.json / lockfile changed (or node_modules is missing)
    method: timestamp
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json
    cmds:
      - npm install

  gui:deps:
    desc: Install GUI deps only if package.json / lockfile changed (or node_modules is missing)
    dir: gui
    method: timestamp
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json
    cmds:
      - npm install

  # ---------- CLI: build / test ----------
  build:
    desc: Compile the CLI (src → dist)
    sources: ["src/**/*.ts", "tsconfig.json"]
    generates: ["dist/**/*.js"]
    cmds:
      - npm run build

  watch:
    desc: Recompile the CLI on every change (tsc --watch)
    cmds:
      - npx tsc --watch

  test:
    desc: Run the CLI test suite (node:test)
    cmds:
      - npm test

  test:contract:
    desc: Run the opt-in contract tests too (needs a real login / live network)
    env:
      AGENT_SWITCH_CONTRACT_TESTS: "1"
    cmds:
      - npm test

  test:gui:
    desc: Run the GUI unit tests (vitest)
    dir: gui
    cmds:
      - npm test

  test:all:
    desc: Run CLI + GUI tests
    cmds:
      - task: test
      - task: test:gui

  typecheck:
    desc: Type-check the CLI (src + tests) without emitting
    cmds:
      - npx tsc --noEmit
      - npx tsc -p tsconfig.test.json --noEmit

  typecheck:gui:
    desc: Type-check the GUI without emitting
    dir: gui
    cmds:
      - npx tsc --noEmit

  # ---------- CLI: run the dev build ----------
  run:
    desc: "Run the dev build with args:  task run -- list --json"
    deps: [build]
    cmds:
      - "{{.NODE}} dist/index.js {{.CLI_ARGS}}"

  dev:
    desc: Build + link this dev build as `agent-switch` on PATH (backs up any installed version; `task unlink` restores it)
    deps: [deps]
    cmds:
      - npm run build
      # Backs up a globally-installed agent-switch before linking (npm link
      # would otherwise fail EEXIST); `task unlink` restores it.
      - bash scripts/dev-link.sh link
      - 'echo "Linked the dev build. Run `task unlink` to restore your installed agent-switch."'
      - 'echo "Tip: export AGENT_SWITCH_HOME=$(mktemp -d) to avoid touching your real profiles."'

  unlink:
    desc: Restore the installed agent-switch (undo `task dev`)
    cmds:
      - bash scripts/dev-link.sh unlink

  doctor:
    desc: Run the dev build's per-OS self-check
    deps: [build]
    cmds:
      - "{{.NODE}} dist/index.js doctor"

  service:run:
    desc: Run the usage daemon in the foreground (dev)
    deps: [build]
    cmds:
      - "{{.NODE}} dist/index.js service run"

  # ---------- GUI (Tauri: needs Rust + a desktop session) ----------
  gui:dev:
    # The GUI spawns the `agent-switch` CLI, so it must drive THIS repo's dev
    # build, not a stale global one. dev-link.sh temporarily links the dev build
    # (backing up any installed agent-switch) and restores the installed version
    # on exit — including Ctrl-C — via a trap. See scripts/dev-link.sh.
    desc: Run the tray GUI in dev — temporarily links the CLI dev build, restores the installed one on exit
    deps: [gui:deps, deps]
    cmds:
      - npm run build
      - bash scripts/dev-link.sh run 'cd gui && npm run tauri dev'

  gui:build:
    desc: Build the GUI frontend bundle
    dir: gui
    cmds:
      - npm run build

  gui:cargo-check:
    desc: Compile-check the Tauri Rust shell
    cmds:
      - cargo check --manifest-path gui/src-tauri/Cargo.toml

  # ---------- aggregate / housekeeping ----------
  ci:
    desc: Mirror CI locally (build + typecheck + CLI & GUI tests)
    cmds:
      - task: build
      - task: typecheck
      - task: test
      - task: test:gui

  # ---------- docs (Starlight) ----------
  docs:install:
    desc: Install the docs-site dependencies (npm ci)
    dir: starlight
    cmds:
      - npm ci

  docs:dev:
    desc: "Serve the docs site locally with hot reload (http://localhost:4321/agent-switch/)"
    dir: starlight
    cmds:
      - npm run dev

  docs:build:
    desc: Build the static docs site into starlight/dist
    dir: starlight
    cmds:
      - npm run build

  docs:preview:
    desc: Preview the built docs site locally
    dir: starlight
    cmds:
      - npm run preview

  docs:check:
    desc: Type-check + validate the docs content collection
    dir: starlight
    cmds:
      - npm run astro -- check

  docs:clean:
    desc: Remove docs build output
    dir: starlight
    cmds:
      - rm -rf dist .astro

  # ---------- release ----------
  release:
    desc: |
      Full one-command release: bump the version in all four files
      (package.json, gui/package.json, tauri.conf.json, Cargo.toml) + commit +
      tag X.Y.Z + PUSH. The tag push triggers the npm publish + installer build
      in CI — no manual follow-up. With no args the bump is auto-detected from
      the commits since the last tag (feat! → major, feat → minor, else patch).
      Usage:
        task release                       # auto-detect, tag, push → CI publishes
        task release -- --dry-run          # preview only, change nothing
        task release -- --no-push          # bump + commit + tag locally, no push
        task release -- 1.2.0              # exact version (override)
        task release -- --as patch|minor|major
    cmds:
      - "{{.NODE}} scripts/release.mjs {{.CLI_ARGS}}"

  release:patch:
    desc: "Release a patch bump: commit + tag + push (CI publishes; --no-push to stop local)"
    cmds:
      - "{{.NODE}} scripts/release.mjs --as patch {{.CLI_ARGS}}"

  release:minor:
    desc: "Release a minor bump: commit + tag + push (CI publishes; --no-push to stop local)"
    cmds:
      - "{{.NODE}} scripts/release.mjs --as minor {{.CLI_ARGS}}"

  release:major:
    desc: "Release a major bump: commit + tag + push (CI publishes; --no-push to stop local)"
    cmds:
      - "{{.NODE}} scripts/release.mjs --as major {{.CLI_ARGS}}"

  npm:login:
    desc: |
      One-time interactive npm login (scoped to @event4u, web-auth + 2FA), then
      verify. For the manual-publish fallback and to bootstrap the very first
      publish of a new package — routine releases run through publish-npm.yml on
      the tag push (OIDC Trusted Publishing, no stored token). Usage:
        task npm:login
    cmds:
      - npm login --scope=@event4u --registry=https://registry.npmjs.org
      - cmd: npm whoami
      - cmd: npm access list packages @event4u

  clean:
    desc: Remove build output
    cmds:
      - rm -rf dist dist-test gui/dist
