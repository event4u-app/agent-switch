<!-- legend -->
<text x="0" y="668" class="t-l">PROFILES — THE HIGH-FREQUENCY SURFACE. EVERY CHANGE REDUCES COMPETING CONTROLS.</text>
<line x1="0" y1="680" x2="1040" y2="680" class="hair"/>
<g class="t-leg">
  <text x="0" y="704" font-weight="600">1 · Provider tabs become a filter, not navigation</text>
  <text x="0" y="722" fill="#868a91">They filter profiles; they are not top-level sections. Demoted from a full-width bar to a 248px</text>
  <text x="0" y="738" fill="#868a91">segmented control, joined by a tag filter, search, and an explicit sort. Sort by headroom makes</text>
  <text x="0" y="754" fill="#868a91">the daily question — "which account can I use right now?" — answerable without reading.</text>

  <text x="0" y="784" font-weight="600">2 · The active profile is a left accent bar</text>
  <text x="0" y="802" fill="#868a91">Not a marker glyph competing with the name. Paired with an "Active" pill for non-colour users.</text>

  <text x="0" y="832" font-weight="600">5 · Empty and failed states say what to do</text>
  <text x="0" y="850" fill="#868a91">"N.A." with hatched bars is replaced by a sentence naming the fix. An unreadable usage window is</text>
  <text x="0" y="866" fill="#868a91">a real, common state (no OAuth readout yet) and deserves direction, not a shrug.</text>

  <text x="530" y="704" font-weight="600">3 · Four controls, not five</text>
  <text x="530" y="722" fill="#868a91">Use (primary, filled only on the active row) · Terminal · Desktop · overflow. Rename and delete</text>
  <text x="530" y="738" fill="#868a91">move into the overflow menu: destructive actions do not sit one pixel from a launch button.</text>
  <text x="530" y="754" fill="#868a91">"Term" becomes "Terminal", "Claude Desktop" becomes "Desktop" — the provider is already the tab.</text>

  <text x="530" y="784" font-weight="600">4 · Two usage windows on the card, the rest in Usage</text>
  <text x="530" y="802" fill="#868a91">The card answers "can I use this account now?" with the session window and the limiting window,</text>
  <text x="530" y="818" fill="#868a91">plus the reset time in words. Per-model rows (the current "Fable"/"All" pair) move to the Usage</text>
  <text x="530" y="834" fill="#868a91">section, where comparison is the job. Card height drops from ~150px to 96px — one more profile</text>
  <text x="530" y="850" fill="#868a91">visible without scrolling at the default window size.</text>
</g>
</svg>
