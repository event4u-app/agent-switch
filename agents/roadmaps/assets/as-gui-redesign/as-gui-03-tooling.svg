<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 900" width="1040" height="900">
<style>
  text{font-family:-apple-system,'SF Pro Text','Inter',system-ui,sans-serif;fill:#dfe1e5}
  .t-h{font-size:15px;font-weight:600}
  .t-b{font-size:13px}
  .t-n{font-size:13px;font-weight:600}
  .t-m{font-size:12px;fill:#868a91}
  .t-s{font-size:11px;fill:#868a91}
  .t-l{font-size:10px;fill:#868a91;letter-spacing:.09em}
  .t-btn{font-size:12px;font-weight:500}
  .t-mono{font-size:11px;font-family:'SF Mono',ui-monospace,Menlo,monospace;fill:#a9b0ba}
  .t-num{font-size:11px;font-weight:700;fill:#1e1f22}
  .t-leg{font-size:12px}
  .hair{stroke:#393b40;stroke-width:1}
</style>

<rect x="0" y="0" width="1040" height="620" rx="10" fill="#1e1f22"/>
<rect x="0" y="0" width="200" height="620" rx="10" fill="#232427"/>
<rect x="190" y="0" width="10" height="620" fill="#232427"/>
<line x1="200" y1="0" x2="200" y2="620" class="hair"/>
<circle cx="20" cy="24" r="6" fill="#f0524d"/><circle cx="40" cy="24" r="6" fill="#d9a441"/><circle cx="60" cy="24" r="6" fill="#499c54"/>
<rect x="16" y="56" width="26" height="26" rx="7" fill="#d15c38"/>
<text x="50" y="74" class="t-h">agent-switch</text>
<text x="50" y="124" class="t-b" fill="#868a91">Profiles</text>
<rect x="150" y="110" width="30" height="18" rx="9" fill="#393b40"/><text x="165" y="123" class="t-s" text-anchor="middle">7</text>
<text x="50" y="162" class="t-b" fill="#868a91">Usage</text>
<rect x="10" y="178" width="180" height="34" rx="8" fill="#2f3134"/>
<rect x="10" y="178" width="3" height="34" rx="1.5" fill="#d15c38"/>
<text x="50" y="200" class="t-b">Tooling</text>
<circle cx="176" cy="195" r="4" fill="#d15c38"/>
<text x="50" y="242" class="t-b" fill="#868a91">Ecosystem</text>
<text x="50" y="280" class="t-b" fill="#868a91">Settings</text>
<line x1="16" y1="548" x2="184" y2="548" class="hair"/>
<circle cx="24" cy="574" r="4" fill="#499c54"/><text x="38" y="578" class="t-s">Auto-switch on</text>
<text x="16" y="600" class="t-s">v1.6.0</text><text x="184" y="600" class="t-s" text-anchor="end">Quit</text>

<line x1="200" y1="52" x2="1040" y2="52" class="hair"/>
<text x="224" y="33" class="t-h">Tooling</text>
<text x="288" y="33" class="t-m">2 of 5 need attention</text>
<rect x="828" y="14" width="84" height="26" rx="7" fill="none" stroke="#393b40"/>
<text x="870" y="31" class="t-btn" fill="#dfe1e5" text-anchor="middle">Re-check</text>
<g stroke="#868a91" stroke-width="1.6" fill="none" stroke-linecap="round">
  <path d="M932 32 a7 7 0 1 1 4 -12 M936 16 v5 h-5"/>
  <path d="M978 20 a7 7 0 0 1 14 0 v8 h-14z M981 32 h8"/>
</g>

<text x="224" y="86" class="t-l">AGENT STACK</text>

<!-- row: agent-config OK -->
<rect x="224" y="98" width="792" height="58" rx="10" fill="#2b2d30"/>
<circle cx="248" cy="127" r="5" fill="#499c54"/>
<text x="266" y="122" class="t-n">agent-config</text>
<text x="266" y="140" class="t-s">Governance rules and skills for your agents · v9.7.0</text>
<text x="700" y="132" class="t-mono">/opt/homebrew/bin/agent-config</text>
<rect x="924" y="114" width="68" height="26" rx="7" fill="none" stroke="#393b40"/>
<text x="958" y="131" class="t-btn" text-anchor="middle">Open</text>

<!-- row: rtk WRONG BINARY -->
<rect x="224" y="164" width="792" height="94" rx="10" fill="#2b2d30"/>
<rect x="224" y="164" width="3" height="94" rx="1.5" fill="#d9a441"/>
<circle cx="248" cy="193" r="5" fill="#d9a441"/>
<text x="266" y="188" class="t-n">rtk</text>
<rect x="292" y="178" width="98" height="16" rx="8" fill="#4a3f24"/>
<text x="341" y="190" class="t-s" text-anchor="middle" fill="#d9a441">Wrong binary</text>
<text x="266" y="206" class="t-s">A different tool named rtk is on your PATH — Rust Type Kit, not Rust Token Killer.</text>
<text x="266" y="222" class="t-s">agent-switch will not wrap commands with it.</text>
<rect x="266" y="230" width="480" height="20" rx="5" fill="#1e1f22"/>
<text x="276" y="244" class="t-mono">brew uninstall rtk &amp;&amp; brew install rtk-ai/tap/rtk</text>
<rect x="756" y="228" width="72" height="24" rx="7" fill="none" stroke="#393b40"/>
<text x="792" y="244" class="t-btn" text-anchor="middle">Copy</text>
<rect x="924" y="180" width="68" height="26" rx="7" fill="none" stroke="#393b40"/>
<text x="958" y="197" class="t-btn" fill="#868a91" text-anchor="middle">Details</text>

<!-- row: claude OK -->
<rect x="224" y="266" width="792" height="58" rx="10" fill="#2b2d30"/>
<circle cx="248" cy="295" r="5" fill="#499c54"/>
<text x="266" y="290" class="t-n">claude</text>
<text x="266" y="308" class="t-s">Claude Code CLI · v2.4.1 · 4 profiles isolated</text>
<text x="700" y="300" class="t-mono">/usr/local/bin/claude</text>

<!-- row: codex OK -->
<rect x="224" y="332" width="792" height="58" rx="10" fill="#2b2d30"/>
<circle cx="248" cy="361" r="5" fill="#499c54"/>
<text x="266" y="356" class="t-n">codex</text>
<text x="266" y="374" class="t-s">Codex CLI · v0.41.0 · 2 profiles isolated</text>
<text x="700" y="366" class="t-mono">~/.local/bin/codex</text>

<!-- row: agy MISSING -->
<rect x="224" y="398" width="792" height="76" rx="10" fill="#2b2d30"/>
<circle cx="248" cy="427" r="5" fill="#6f7280"/>
<text x="266" y="422" class="t-n" fill="#868a91">agy</text>
<rect x="298" y="412" width="72" height="16" rx="8" fill="#393b40"/>
<text x="334" y="424" class="t-s" text-anchor="middle">Not found</text>
<text x="266" y="440" class="t-s">Antigravity CLI · 1 profile is configured but the binary is not on your PATH.</text>
<rect x="266" y="448" width="330" height="20" rx="5" fill="#1e1f22"/>
<text x="276" y="462" class="t-mono">agent-switch link-provider agy &lt;path&gt;</text>
<rect x="606" y="446" width="72" height="24" rx="7" fill="none" stroke="#393b40"/>
<text x="642" y="462" class="t-btn" text-anchor="middle">Copy</text>

<text x="224" y="506" class="t-s">Checks run from the same readout as</text>
<text x="452" y="506" class="t-mono">agent-switch doctor</text>
<text x="566" y="506" class="t-s">— the CLI and this page can never disagree.</text>

<line x1="200" y1="588" x2="1040" y2="588" class="hair"/>
<text x="224" y="608" class="t-s">Last checked 12s ago</text>
<text x="1016" y="608" class="t-s" text-anchor="end">macOS · arm64</text>

<circle cx="212" cy="192" r="10" fill="#d15c38"/><text x="212" y="196" class="t-num" text-anchor="middle">1</text>
<circle cx="1006" cy="242" r="10" fill="#d15c38"/><text x="1006" y="246" class="t-num" text-anchor="middle">2</text>
<circle cx="212" cy="428" r="10" fill="#d15c38"/><text x="212" y="432" class="t-num" text-anchor="middle">3</text>
<circle cx="212" cy="502" r="10" fill="#d15c38"/><text x="212" y="506" class="t-num" text-anchor="middle">4</text>

<text x="0" y="668" class="t-l">TOOLING — DETECT, EXPLAIN, FIX. THE SECTION THAT MAKES AS A SETUP SURFACE.</text>
<line x1="0" y1="680" x2="1040" y2="680" class="hair"/>
<g class="t-leg">
  <text x="0" y="704" font-weight="600">1 · Three states, not a boolean</text>
  <text x="0" y="722" fill="#868a91">Present-and-correct · present-but-wrong · absent. The middle state is real: the rtk upstream</text>
  <text x="0" y="738" fill="#868a91">documents a hard name collision with Rust Type Kit and names `rtk gain` as the discriminator.</text>
  <text x="0" y="754" fill="#868a91">A row that only knows "on PATH / not on PATH" would confidently report the wrong tool as ready.</text>

  <text x="0" y="784" font-weight="600">2 · Copy-the-command is the default action</text>
  <text x="0" y="802" fill="#868a91">A "Run" button appears only for tools where unattended install was proven on that OS (spike S0.3).</text>
  <text x="0" y="818" fill="#868a91">Everywhere else the command is shown and copyable. agent-config's wizard already made this call</text>
  <text x="0" y="834" fill="#868a91">for the same reason: a one-click install that fails on a stock machine is worse than a command.</text>

  <text x="530" y="704" font-weight="600">3 · Rows are ordered by what needs you</text>
  <text x="530" y="722" fill="#868a91">Attention rows carry a left accent and grow to fit their explanation; healthy rows stay at 58px</text>
  <text x="530" y="738" fill="#868a91">and say only what they are, their version and where they live. Height encodes urgency.</text>

  <text x="530" y="768" font-weight="600">4 · One source of truth, two renderers</text>
  <text x="530" y="786" fill="#868a91">The page renders the CLI's JSON readout. Detection never happens in the GUI, so `doctor` in a</text>
  <text x="530" y="802" fill="#868a91">terminal and this page are the same answer. New tool support is added once, in the CLI.</text>

  <text x="530" y="832" font-weight="600">Copy rules</text>
  <text x="530" y="850" fill="#868a91">Every row states what the tool does for the user, never how it is wired. Failures say what</text>
  <text x="530" y="866" fill="#868a91">happened and what to run — they do not apologise and they are never vague.</text>
</g>
</svg>
