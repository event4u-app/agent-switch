<text x="224" y="608" class="t-s">Refreshed 4:03 ago · own profiles only</text>
<text x="1016" y="608" class="t-s" text-anchor="end">Claude · 4 profiles</text>

<circle cx="212" cy="105" r="10" fill="#d15c38"/><text x="212" y="109" class="t-num" text-anchor="middle">1</text>
<circle cx="212" cy="200" r="10" fill="#d15c38"/><text x="212" y="204" class="t-num" text-anchor="middle">2</text>
<circle cx="1006" cy="340" r="10" fill="#d15c38"/><text x="1006" y="344" class="t-num" text-anchor="middle">3</text>
<circle cx="212" cy="452" r="10" fill="#d15c38"/><text x="212" y="456" class="t-num" text-anchor="middle">4</text>
<circle cx="212" cy="604" r="10" fill="#d15c38"/><text x="212" y="608" class="t-num" text-anchor="middle">5</text>

<text x="0" y="668" class="t-l">USAGE — COMPARISON ACROSS ACCOUNTS, WHICH THE PER-CARD BARS COULD NEVER ANSWER</text>
<line x1="0" y1="680" x2="1040" y2="680" class="hair"/>
<g class="t-leg">
  <text x="0" y="704" font-weight="600">1 · The page answers one question first</text>
  <text x="0" y="722" fill="#868a91">"Which account has room?" as a sentence with a one-click switch — the same decision the</text>
  <text x="0" y="738" fill="#868a91">auto-switch daemon already makes, surfaced manually. Not a dashboard tile.</text>

  <text x="0" y="768" font-weight="600">2 · One row per account, aligned columns</text>
  <text x="0" y="786" fill="#868a91">Alignment is what makes comparison possible; the current per-card bars are unalignable by</text>
  <text x="0" y="802" fill="#868a91">construction. Per-model rows land here as an expandable sub-row, not on the profile card.</text>

  <text x="0" y="832" font-weight="600">3 · Colour encodes state, not decoration</text>
  <text x="0" y="850" fill="#868a91">Green under the auto-switch threshold, amber approaching, red past it — the same thresholds</text>
  <text x="0" y="866" fill="#868a91">the daemon uses, so the UI and the daemon can never tell different stories.</text>

  <text x="530" y="704" font-weight="600">4 · History earns the section</text>
  <text x="530" y="722" fill="#868a91">A 30-day rolling view of the week window per account. This is the read adopted in</text>
  <text x="530" y="738" fill="#868a91">EXTENSION-ANALYSIS.md ("30-day usage history, ≤720 samples, sparkline") — it needs a page,</text>
  <text x="530" y="754" fill="#868a91">which is a large part of why the Usage section exists at all.</text>

  <text x="530" y="784" font-weight="600">5 · The scope disclaimer is permanent</text>
  <text x="530" y="802" fill="#868a91">"own profiles only" stays in the footer. AS reads its own accounts' quota endpoints and</text>
  <text x="530" y="818" fill="#868a91">nothing else; stating it where the numbers are is the cheapest way to keep that promise legible.</text>

  <text x="530" y="848" font-weight="600">Not built here</text>
  <text x="530" y="866" fill="#868a91">No cost estimates, no provider pooling, no cross-provider aggregate — see NON-GOALS.md.</text>
</g>
</svg>
