name: Release

# Build the Tauri GUI installers for macOS, Linux, and Windows and attach them
# to a GitHub Release. The `agent-switch` CLI itself ships via npm (see the
# `pack` job in ci.yml) — the GUI locates it on PATH at runtime, so these
# installers cover the desktop shell only.
on:
  push:
    tags:
      # Bare-numeric version tags (no `v` prefix) — matches the published 1.0.0
      # release and the @event4u/agent-config convention.
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:

jobs:
  installers:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # tauri-action creates the GitHub Release
      id-token: write # npm OIDC Trusted Publishing for the per-platform GUI package
    strategy:
      fail-fast: false
      matrix:
        include:
          # One universal .dmg/.app that runs on both Apple Silicon and Intel.
          - os: macos-latest
            label: macOS (universal)
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: "--target universal-apple-darwin"
            gui-pkg: darwin
          # 22.04 keeps the glibc/webkit floor low for broad Linux compatibility.
          - os: ubuntu-22.04
            label: Linux (deb / rpm / AppImage)
            rust-targets: ""
            args: ""
            gui-pkg: linux-x64
          - os: windows-latest
            label: Windows (msi / nsis)
            rust-targets: ""
            args: ""
            gui-pkg: win32-x64
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux bundling dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            build-essential \
            file

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org" # for the per-platform npm publish below
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri

      # tauri-action does not install frontend deps itself; the Tauri
      # beforeBuildCommand (`npm run build` → vite) needs them present.
      - name: Install frontend dependencies
        run: npm ci
        working-directory: gui

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gui
          # Tag-triggered: reuse the pushed bare tag (e.g. 1.2.0). Manual runs
          # fall back to the app version so a dispatch still lands on a release.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '__VERSION__' }}
          releaseName: "agent-switch ${{ github.ref_type == 'tag' && github.ref_name || '__VERSION__' }}"
          # Publish immediately (NOT a draft) — a draft release is invisible to
          # GitHub's /releases/latest, so the in-app update check never sees it.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Ship the built GUI binary as a per-platform npm package so
      # `agent-switch gui` (an optionalDependency of the CLI) can launch it —
      # npm delivery carries no quarantine flag, so no Gatekeeper/SmartScreen
      # block. Only on a real tag push (a version to pin to), and idempotent so
      # a re-run never double-publishes. One-time npm setup: configure Trusted
      # Publishing for each @event4u/agent-switch-<platform> package too.
      - name: Publish the per-platform GUI npm package
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          set -e
          npm install -g npm@11
          node scripts/pack-gui-platform.mjs --platform "${{ matrix.gui-pkg }}" --out gui-pkg
          ver="$(node -p "require('./package.json').version")"
          if npm view "@event4u/agent-switch-${{ matrix.gui-pkg }}@${ver}" version >/dev/null 2>&1; then
            echo "@event4u/agent-switch-${{ matrix.gui-pkg }}@${ver} already published — skipping."
          else
            (cd gui-pkg && npm publish)
          fi
