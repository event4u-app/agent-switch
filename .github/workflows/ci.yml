name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} · node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        node: [18, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      # Contract tests (AGENT_SWITCH_CONTRACT_TESTS) stay opt-in / local — they need
      # a real Claude Code login and live network, so CI runs the unit suite only.
      - run: npm test

  pack:
    name: tarball smoke (ubuntu · node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # Install the packed tarball into a throwaway prefix and smoke the bin.
      - run: |
          set -e
          npm pack
          tgz="$(ls agent-switch-*.tgz)"
          prefix="$(mktemp -d)"
          npm install -g --prefix "$prefix" "./$tgz"
          "$prefix/bin/agent-switch" --help
          AGENT_SWITCH_HOME="$(mktemp -d)" "$prefix/bin/agent-switch" doctor || true

  gui:
    name: gui ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
        working-directory: gui
      - run: npm test
        working-directory: gui
      - run: npx tsc --noEmit
        working-directory: gui
      - run: npm run build
        working-directory: gui
      # Compile-check the Tauri Rust shell. Full `tauri build` bundling
      # (.dmg/.msi + a tray icon asset) is a packaging follow-up.
      - run: cargo check --manifest-path gui/src-tauri/Cargo.toml
