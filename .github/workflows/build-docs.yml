name: Build docs

# Build the Starlight docs site and deploy it to GitHub Pages
# (https://event4u-app.github.io/agent-switch/).
#
# Triggered on a bare-numeric version tag push — the SAME tag that release.yml
# and publish-npm.yml use — so the docs publish alongside every release. We do
# NOT use `release: [published]`: release.yml creates the GitHub Release with
# the GITHUB_TOKEN, and events emitted by GITHUB_TOKEN never trigger further
# workflow runs, so a `release` trigger would silently never fire. The tag push
# is done by scripts/release.mjs (a real push), so it does trigger workflows.
# workflow_dispatch is kept for a one-off manual re-deploy of the current tag.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; never cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: starlight/package-lock.json
      - name: Install docs dependencies
        working-directory: starlight
        run: npm ci
      - name: Build docs site
        working-directory: starlight
        run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: starlight/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
